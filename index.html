<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrolling Ad Ticker</title>

  <style>
    @font-face {
      font-family: "Lulo";
      src: url("fonts/Lulo.otf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #003666;
      --text: #ffffff;
      --header-max: 1100px;
      --ticker-logo-height: 195px;
      --ticker-gap: 60px;
      --header-pad-top: 36px;
      --header-pad-side: 20px;
      --header-pad-bottom: 12px;
      --ticker-pad-top: 18px;
      --ticker-pad-bottom: 22px;
      --title-size: 25px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Lulo", "Trebuchet MS", Arial, sans-serif;
      position: relative;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* ===== HEADER SECTION ===== */
    header {
      width: 100%;
      display: flex;
      justify-content: center;
      text-align: center;
      padding: var(--header-pad-top) var(--header-pad-side) var(--header-pad-bottom);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    header h1 {
      margin: 0;
      width: 100%;
      max-width: var(--header-max);
      color: var(--text);
      font-size: var(--title-size);
      font-weight: normal;
      line-height: 1.2;
      letter-spacing: 0.5px;
      text-align: center;
      text-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
      text-wrap: balance;
    }

    .ticker-section {
      width: 100%;
      margin-top: auto;
      padding: var(--ticker-pad-top) 0 var(--ticker-pad-bottom);
      overflow: hidden;
      flex-shrink: 0;
    }

    .ticker-wrapper {
      width: 100%;
      overflow: hidden;
      background: transparent;
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: scroll-left 195s linear infinite;
      will-change: transform;
    }

    .ticker-track img {
      height: var(--ticker-logo-height);
      width: auto;
      margin: 0 var(--ticker-gap);
      object-fit: contain;
      object-position: center;
      border-radius: 10px;
      flex-shrink: 0;
      max-width: none;
      filter: drop-shadow(1px 12px 5px rgba(0, 0, 0, 0.7));
    }

    @keyframes scroll-left {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    /* ===== Large tablets / small laptops ===== */
    @media (max-width: 1200px) {
      :root {
        --ticker-logo-height: 165px;
        --ticker-gap: 42px;
        --title-size: 22px;
        --header-pad-top: 28px;
        --ticker-pad-top: 14px;
        --ticker-pad-bottom: 18px;
      }
    }

    /* ===== Tablets ===== */
    @media (max-width: 900px) {
      :root {
        --ticker-logo-height: 130px;
        --ticker-gap: 28px;
        --title-size: 19px;
        --header-pad-top: 24px;
        --header-pad-side: 16px;
        --header-pad-bottom: 10px;
        --ticker-pad-top: 12px;
        --ticker-pad-bottom: 16px;
      }

      .ticker-track {
        animation-duration: 165s;
      }

      header h1 {
        letter-spacing: 0.3px;
      }
    }

    /* ===== Mobile ===== */
    @media (max-width: 600px) {
      :root {
        --ticker-logo-height: 88px;
        --ticker-gap: 16px;
        --title-size: 13px;
        --header-pad-top: 18px;
        --header-pad-side: 14px;
        --header-pad-bottom: 8px;
        --ticker-pad-top: 10px;
        --ticker-pad-bottom: 14px;
      }

      .page {
        min-height: 100dvh;
      }

      .ticker-track {
        animation-duration: 130s;
      }

      .ticker-track img {
        border-radius: 8px;
        filter: drop-shadow(1px 8px 4px rgba(0, 0, 0, 0.5));
      }

      header h1 {
        line-height: 1.3;
      }
    }

    /* ===== Very small mobile ===== */
    @media (max-width: 400px) {
      :root {
        --ticker-logo-height: 72px;
        --ticker-gap: 12px;
        --title-size: 11px;
        --header-pad-top: 14px;
        --header-pad-side: 10px;
        --ticker-pad-bottom: 10px;
      }

      .ticker-track {
        animation-duration: 115s;
      }
    }

    /* ===== Short screens ===== */
    @media (max-height: 500px) {
      :root {
        --header-pad-top: 12px;
        --header-pad-bottom: 6px;
        --ticker-pad-top: 8px;
        --ticker-pad-bottom: 8px;
        --ticker-logo-height: 72px;
      }

      header h1 {
        line-height: 1.15;
      }
    }
  </style>
</head>
