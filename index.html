<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrolling Ad Ticker</title>

  <style>
    @font-face {
      font-family: "Lulo";
      src: url("fonts/Lulo.otf") format("truetype");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: #003666;
      font-family: "Lulo", "Trebuchet MS", Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ===== HEADER SECTION ===== */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 36px 20px 0;
      position: relative;
      z-index: 2;
    }

    header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 25px;
      font-weight: normal;
      line-height: 1.2;
      letter-spacing: 0.5px;
      text-align: center;
      text-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .ticker-wrapper {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      overflow: hidden;
      background: transparent;
      padding: 18px 0 22px;
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: scroll-left 195s linear infinite;
      will-change: transform;
    }

    .ticker-track img {
      height: 195px;
      margin: 0 60px;
      object-fit: contain;
      border-radius: 10px;
      flex-shrink: 0;
      filter: drop-shadow(1px 12px 5px rgba(0, 0, 0, 0.7));
    }

    @keyframes scroll-left {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>

  </header>
